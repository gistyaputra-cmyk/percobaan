<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Store Gen Z</title>
  <style>
    body { font-family: Arial; margin:0; background:#0f172a; color:white; }
    .container { display:flex; justify-content:center; align-items:center; height:100vh; }
    .box { background:#1e293b; padding:30px; border-radius:12px; width:300px; }
    input { width:100%; padding:10px; margin:10px 0; border:none; border-radius:8px; }
    button { width:100%; padding:10px; background:#22c55e; border:none; border-radius:8px; color:white; cursor:pointer; }
    .hidden { display:none; }
    .products { display:flex; flex-wrap:wrap; gap:20px; padding:20px; }
    .card { background:#1e293b; padding:10px; border-radius:12px; width:200px; cursor:pointer; }
    .card img { width:100%; border-radius:10px; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }
    .modal-content { background:#1e293b; padding:20px; border-radius:12px; text-align:center; }
    .modal img { width:200px; border-radius:10px; }
  </style>
</head>
<body><div id="loginPage" class="container">
  <div class="box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
    <p id="error" style="color:red;"></p>
  </div>
</div><div id="productPage" class="hidden">
  <h1 style="text-align:center;">Rizaldy Store Digital🔥</h1>
  <div class="products">
    <div class="card" onclick="openModal('Ebook Bisnis', 'https://i0.wp.com/only-print.com/wp-content/uploads/2020/07/pexels-photo-1475296-e1615735191421.jpeg?ssl=1.png')">
      <img src="https://i0.wp.com/only-print.com/wp-content/uploads/2020/07/pexels-photo-1475296-e1615735191421.jpeg?ssl=1.png">
      <p>Ebook Bisnis</p>
    </div>
    <div class="card" onclick="openModal('Preset Lightroom', 'https://fixthephoto.com/lightroom-presets-high-contrast/download-1.png')">
      <img src="https://fixthephoto.com/lightroom-presets-high-contrast/download-1.png">
      <p>Preset Lightroom</p>
    </div>
    <div class="card" onclick="openModal('Template Website', 'https://dribbble.com/shots/14470913-Free-Corporate-Website-PSD-Templates.png')">
      <img src="https://dribbble.com/shots/14470913-Free-Corporate-Website-PSD-Templates.png">
      <p>Template Website</p>
    </div>
    <div class="card" onclick="openModal('Course Trading', 'https://www.worldfinance.com/markets/advanced-trading-tech-opens-up-new-opportunities.png')">
      <img src="https://www.worldfinance.com/markets/advanced-trading-tech-opens-up-new-opportunities.png">
      <p>Course Trading</p>
    </div>
  </div>
</div><div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="productTitle"></h2>
    <img id="productImg">
    <p>Transfer ke DANA: <b>085708829924</b></p>
    <p>Kirim bukti ke WhatsApp</p>
    <button onclick="buy()">Beli</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div><script>
function login() {
  let user = document.getElementById('username').value;
  let pass = document.getElementById('password').value;

  if(user === 'admin' && pass === '1234') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('productPage').classList.remove('hidden');
  } else {
    document.getElementById('error').innerText = 'Login salah!';
  }
}

function openModal(title, img) {
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('productTitle').innerText = title;
  document.getElementById('productImg').src = img;
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function buy() {
  alert('Silakan transfer ke DANA dan kirim bukti via WhatsApp!');
}
</script></body>
</html>
